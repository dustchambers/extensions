<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background — solid purple (gradient invisible at icon size) -->
  <rect width="512" height="512" fill="#6D3AE8"/>

  <!-- 8-bit SD card body (white, pixel-aligned) -->
  <!-- Main rectangle -->
  <rect x="128" y="96" width="256" height="336" rx="0" fill="#F0F0F0"/>
  <!-- Corner notch (top-right cut) -->
  <polygon points="384,96 384,160 320,96" fill="#6D3AE8"/>
  <!-- Angled edge fill -->
  <polygon points="320,96 384,160 384,96" fill="#6D3AE8"/>
  <line x1="320" y1="96" x2="384" y2="160" stroke="#D0D0E0" stroke-width="4"/>

  <!-- Contact pins (gold, 8-bit style) -->
  <rect x="176" y="112" width="24" height="48" fill="#DAA520"/>
  <rect x="208" y="112" width="24" height="48" fill="#DAA520"/>
  <rect x="240" y="112" width="24" height="48" fill="#DAA520"/>
  <rect x="272" y="112" width="24" height="48" fill="#DAA520"/>

  <!-- Write-protect notch (left side) -->
  <rect x="128" y="160" width="12" height="48" fill="#D0D0E0"/>

  <!-- Label area -->
  <rect x="152" y="200" width="208" height="96" rx="4" fill="#E0E0F0" stroke="#C0C0D0" stroke-width="2"/>

  <!-- 8-bit text "SD" on label -->
  <!-- S -->
  <rect x="192" y="224" width="32" height="8" fill="#6D28D9"/>
  <rect x="184" y="224" width="8" height="8" fill="#6D28D9"/>
  <rect x="184" y="232" width="8" height="8" fill="#6D28D9"/>
  <rect x="184" y="240" width="32" height="8" fill="#6D28D9"/>
  <rect x="216" y="248" width="8" height="8" fill="#6D28D9"/>
  <rect x="216" y="256" width="8" height="8" fill="#6D28D9"/>
  <rect x="184" y="264" width="32" height="8" fill="#6D28D9"/>
  <rect x="184" y="256" width="8" height="8" fill="#6D28D9"/>

  <!-- D -->
  <rect x="240" y="224" width="8" height="48" fill="#6D28D9"/>
  <rect x="248" y="224" width="24" height="8" fill="#6D28D9"/>
  <rect x="272" y="232" width="8" height="32" fill="#6D28D9"/>
  <rect x="248" y="264" width="24" height="8" fill="#6D28D9"/>

  <!-- Pixel sparkle (top-left) -->
  <rect x="96" y="72" width="8" height="8" fill="#FFFFFF" opacity="0.9"/>
  <rect x="80" y="80" width="8" height="8" fill="#FFFFFF" opacity="0.5"/>
  <rect x="104" y="80" width="8" height="8" fill="#FFFFFF" opacity="0.5"/>
  <rect x="96" y="64" width="8" height="8" fill="#FFFFFF" opacity="0.5"/>
  <rect x="96" y="88" width="8" height="8" fill="#FFFFFF" opacity="0.5"/>

  <!-- Pixel sparkle (bottom-right) -->
  <rect x="400" y="400" width="8" height="8" fill="#FFFFFF" opacity="0.7"/>
  <rect x="392" y="408" width="8" height="8" fill="#FFFFFF" opacity="0.4"/>
  <rect x="408" y="408" width="8" height="8" fill="#FFFFFF" opacity="0.4"/>
  <rect x="400" y="416" width="8" height="8" fill="#FFFFFF" opacity="0.4"/>

  <!-- Bottom pixel detail strip -->
  <rect x="152" y="360" width="16" height="8" fill="#D0D0E0"/>
  <rect x="176" y="360" width="16" height="8" fill="#D0D0E0"/>
  <rect x="200" y="360" width="16" height="8" fill="#D0D0E0"/>
  <rect x="224" y="360" width="16" height="8" fill="#D0D0E0"/>
  <rect x="248" y="360" width="16" height="8" fill="#D0D0E0"/>
  <rect x="272" y="360" width="16" height="8" fill="#D0D0E0"/>
  <rect x="296" y="360" width="16" height="8" fill="#D0D0E0"/>
  <rect x="320" y="360" width="16" height="8" fill="#D0D0E0"/>
</svg>
